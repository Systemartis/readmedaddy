name: ci

on:
  push:
    branches: [main]
  pull_request:
  merge_group:

permissions:
  contents: read

jobs:
  validate:
    name: validate skill (structure, links, frontmatter, clean-for-publish)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: structural validation
        run: python3 scripts/validate-skill.py

  shell:
    name: shell scripts (shellcheck + syntax + hook test)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        # Preinstalled on ubuntu-latest; macOS runners need brew.
        run: |
          command -v shellcheck >/dev/null || brew install shellcheck
          shellcheck install.sh \
            skills/readmedaddy/hooks/readme-drift.sh \
            skills/readmedaddy/eval/hook/test-readme-drift.sh
      - name: posix syntax check
        run: |
          sh -n install.sh
          sh -n skills/readmedaddy/hooks/readme-drift.sh
          sh -n skills/readmedaddy/eval/hook/test-readme-drift.sh
      - name: executable bits survive (the README quickstart depends on them)
        run: |
          test -x install.sh
          test -x skills/readmedaddy/hooks/readme-drift.sh
      - name: hook behavior test
        run: sh skills/readmedaddy/eval/hook/test-readme-drift.sh

  python:
    name: python scripts (compile + selftests)
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - name: py_compile
        run: python3 -m py_compile scripts/install-hook.py scripts/readmedaddy-init.py skills/readmedaddy/eval/score.py
      - name: install-hook selftest
        run: python3 scripts/install-hook.py --selftest
      - name: wizard selftest
        run: python3 scripts/readmedaddy-init.py --selftest
      - name: score.py selftest (weights mirror the rubric)
        run: python3 skills/readmedaddy/eval/score.py --selftest
      - name: action event-matrix test
        run: |
          python3 -m pip install --quiet pyyaml 2>/dev/null || true
          python3 skills/readmedaddy/eval/action/test-action-events.py
      - name: opencode plugin behavioral test (node, stubbed runtime)
        run: node skills/readmedaddy/eval/hook/test-opencode-plugin.mjs

  markdown:
    name: markdownlint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: markdownlint
        run: npx --yes markdownlint-cli2 "**/*.md" "#node_modules"
        # The clean-for-publish (forbidden-reference) guard is owned by
        # scripts/validate-skill.py in the `validate` job — single source.

  # Dogfood: this repo's own README is held to the drift gate it ships.
  drift:
    name: readme drift (dogfood of ./action.yml)
    if: contains(fromJSON('["pull_request","merge_group"]'), github.event_name)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: ./
        with:
          mode: comment
